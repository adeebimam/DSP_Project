{% extends "base.html" %}

{% block title %}Add Expense - Expense Tracker{% endblock %}

{% block content %}
<div class="page-wrap">
    <div class="form-page">
        <div class="form-page-header">
            <h1>Add Expense</h1>
            <p class="form-page-subtitle">Track a new expense by filling out the details below.</p>
        </div>

        <form method="POST" action="/add-expense" class="modern-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Amount & Date Row -->
            <div class="form-row">
                <div class="form-group-modern">
                    <label for="amount">
                        Amount
                    </label>
                    <div class="input-with-prefix">
                        <span class="input-prefix">£</span>
                        <input type="number" id="amount" name="amount" min="0" step="0.01" value="{{ amount or '' }}" placeholder="0.00" required>
                    </div>
                </div>
                <div class="form-group-modern">
                    <label for="date">
                       Date
                    </label>
                    <input type="date" id="date" name="date" required
                        value="{{ date if date else current_date }}"
                        max="{{ current_date }}">
                </div>
            </div>

            <!-- Category & Payment Method Row -->
            <div class="form-row">
                <div class="form-group-modern">
                    <label for="category">
                     Category
                    </label>
                    <select id="category" name="category" required>
                        <option value="">Select category...</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Books">Books</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group-modern">
                    <label for="payment_method">
                    Payment Method
                    </label>
                    <select id="payment_method" name="payment_method">
                        <option value="">Select method...</option>
                        <option value="Cash">Cash</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="Online">Online</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Merchant -->
            <div class="form-group-modern">
                <label for="merchant">
                    Merchant
                </label>
                <input type="text" id="merchant" name="merchant" value="{{ merchant or '' }}" placeholder="e.g. Tesco, Amazon, Starbucks...">
            </div>

            <!-- Note -->
            <div class="form-group-modern">
                <label for="note">
                    Note <span class="label-optional">(optional)</span>
                </label>
                <textarea id="note" name="note" rows="3" placeholder="Add any extra details..."></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-form">Save Expense</button>
                <a href="/dashboard" class="btn btn-cancel btn-form">Cancel</a>
            </div>
        </form>

        <!-- Quick Link -->
        <div class="form-footer">
            <p>Have a receipt? <a href="{{ url_for('scan_receipt') }}" class="link-primary">Scan it instead</a></p>
        </div>
    </div>
</div>
{% endblock %}
